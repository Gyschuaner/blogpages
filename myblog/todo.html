<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo - Xgg的个人主页</title>
    <link rel="stylesheet" href="style.css?v=20260526-article2">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式重置和基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #8b4513;
            color: #f5deb3;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        /* 导航栏样式调整 */
        #navbar {
            background-color: #654321;
            border-bottom: 2px solid #4a3020;
        }
        
        #navbar .logo a {
            color: #f5deb3;
        }
        
        #navbar .menu a {
            color: #f5deb3;
        }
        
        #navbar .menu a:hover {
            color: #d2b48c;
        }
        
        /* 主容器 - 覆盖整个页面 */
        .todo-section {
            background-color: #8b4513;
            min-height: calc(100vh - 80px);
            padding: 0;
            margin: 0;
        }
        
        .todo-section .container {
            padding: 0;
            margin: 0;
            max-width: 100%;
        }
        
        /* 任务列表容器 */
        .todo-container {
            max-width: 100%;
            width: 100%;
            margin: 0;
            padding: 30px;
            background-color: #8b4513;
        }
        
        /* 标题样式 */
        .todo-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #654321;
        }
        
        .todo-header h2 {
            color: #f5deb3;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .todo-header p {
            color: #d2b48c;
            font-size: 18px;
        }
        
        /* 任务列表 */
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            margin-bottom: 15px;
            background-color: #654321;
            border-left: 5px solid #8b5a2b;
            transition: all 0.3s ease;
        }
        
        .todo-item:hover {
            background-color: #784c1e;
            transform: translateX(10px);
        }
        
        .todo-item.completed {
            background-color: #5d4037;
            border-left-color: #4a2511;
        }
        
        .todo-item.completed .task-text {
            text-decoration: line-through;
            color: #a1887f;
        }
        
        /* 复选框样式 */
        .task-checkbox {
            margin-right: 20px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #d2b48c;
        }
        
        .task-checkbox:checked {
            accent-color: #8b5a2b;
        }
        
        /* 任务文本 */
        .task-text {
            flex: 1;
            font-size: 18px;
            color: #f5deb3;
            line-height: 1.6;
        }
        
        /* 任务统计 */
        .task-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #654321;
            font-size: 16px;
            color: #d2b48c;
        }
        
        .task-stats strong {
            color: #f5deb3;
            font-size: 18px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #d2b48c;
        }
        
        .empty-state i {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.6;
        }
        
        .empty-state p {
            font-size: 20px;
            line-height: 1.6;
        }
        
        /* 返回顶部按钮样式调整 */
        .back-to-top {
            background-color: #654321;
            color: #f5deb3;
            border: 2px solid #8b5a2b;
        }
        
        .back-to-top:hover {
            background-color: #8b5a2b;
            color: #f5deb3;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .todo-container {
                padding: 20px;
            }
            
            .todo-header h2 {
                font-size: 28px;
            }
            
            .todo-item {
                padding: 15px 20px;
            }
            
            .task-text {
                font-size: 16px;
            }
            
            .task-stats {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header id="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Xgg的个人主页</a>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="home.html">首页</a></li>
                    <li><a href="about.html">关于我</a></li>
                    <li><a href="skills.html">技能</a></li>
                    <li><a href="projects.html">项目</a></li>
                    <li><a href="blog.html">博客</a></li>
                    <li><a href="timeline.html">轨迹</a></li>
                    <li><a href="todo.html">ToDo</a></li>
                </ul>
            </nav>
            <div class="social-links">
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-bilibili"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <!-- ToDo部分 -->
    <section class="todo-section">
        <div class="container">
            <div class="todo-container">
            <div class="todo-header">
                <h2><i class="fas fa-tasks"></i> 网站建设进度</h2>
                <p></p>
            </div>
            
            <!-- 任务列表 -->
            <ul id="todo-list" class="todo-list">
                <!-- 任务将通过JavaScript动态生成 -->
            </ul>
            
            <!-- 任务统计 -->
            <div class="task-stats">
                <span>总任务数: <strong id="total-tasks">0</strong></span>
                <span>已完成: <strong id="completed-tasks">0</strong></span>
                <span>未完成: <strong id="active-tasks">0</strong></span>
            </div>
        </div>
        </div>
    </section>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
    <script>
        // 简化版ToDo功能 - 只保留打勾功能
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const todoList = document.getElementById('todo-list');
            const totalTasksElement = document.getElementById('total-tasks');
            const completedTasksElement = document.getElementById('completed-tasks');
            const activeTasksElement = document.getElementById('active-tasks');
            
            // 加载任务（从代码中直接定义，不允许用户添加新任务）
            let tasks = [
                { id: 1, text: '完成“关于我”模块', completed: false },
                { id: 2, text: '完成“技能”模块', completed: false },
                { id: 3, text: '完成“项目”模块', completed: false },
                { id: 4, text: '优化"轨迹"模块，点击任何一个时间点能跳转到一个具体的页面', completed: false },
                { id: 5, text: '美化主页，再增加一点功能', completed: false }
            ];
            
            // 从localStorage加载保存的状态
            loadTaskStatus();
            
            // 渲染任务列表
            renderTasks();
            updateStats();
            
            // 渲染任务列表
            function renderTasks() {
                todoList.innerHTML = '';
                
                // 显示空状态
                if (tasks.length === 0) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-state';
                    emptyState.innerHTML = `
                        <i class="fas fa-tasks"></i>
                        <p>暂无任务</p>
                    `;
                    todoList.appendChild(emptyState);
                    return;
                }
                
                // 创建任务项
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${task.completed ? 'completed' : ''}`;
                    li.setAttribute('data-id', task.id);
                    
                    li.innerHTML = `
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <span class="task-text">${task.text}</span>
                    `;
                    
                    todoList.appendChild(li);
                });
                
                // 添加复选框事件监听器
                addCheckboxEventListeners();
            }
            
            // 添加复选框事件监听器
            function addCheckboxEventListeners() {
                document.querySelectorAll('.task-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', function() {
                        const taskId = parseInt(this.parentNode.getAttribute('data-id'));
                        toggleTaskStatus(taskId);
                    });
                });
            }
            
            // 切换任务完成状态
            function toggleTaskStatus(taskId) {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    saveTaskStatus(); // 保存状态
                    renderTasks();
                    updateStats();
                }
            }
            
            // 更新统计信息
            function updateStats() {
                const total = tasks.length;
                const completed = tasks.filter(task => task.completed).length;
                const active = total - completed;
                
                totalTasksElement.textContent = total;
                completedTasksElement.textContent = completed;
                activeTasksElement.textContent = active;
            }
            
            // 保存任务状态到localStorage
            function saveTaskStatus() {
                const taskStatus = tasks.map(task => ({
                    id: task.id,
                    completed: task.completed
                }));
                localStorage.setItem('todoTaskStatus', JSON.stringify(taskStatus));
            }
            
            // 从localStorage加载任务状态
            function loadTaskStatus() {
                const savedStatus = localStorage.getItem('todoTaskStatus');
                if (savedStatus) {
                    const taskStatus = JSON.parse(savedStatus);
                    // 更新任务的完成状态
                    tasks.forEach(task => {
                        const savedTask = taskStatus.find(t => t.id === task.id);
                        if (savedTask) {
                            task.completed = savedTask.completed;
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
