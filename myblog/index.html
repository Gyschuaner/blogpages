<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - Xgg的个人主页</title>
    <link rel="stylesheet" href="style.css?v=20260526-article2">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <header id="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Xgg的个人主页</a>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="home.html">首页</a></li>
                    <li><a href="about.html">关于我</a></li>
                    <li><a href="skills.html">技能</a></li>
                    <li><a href="projects.html">项目</a></li>
                    <li><a href="blog.html">博客</a></li>
                    <li><a href="timeline.html">轨迹</a></li>
                </ul>
            </nav>
            <div class="social-links">
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-bilibili"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <!-- 主页部分 -->
    <section id="home" class="hero">
        <div class="tree-left"></div>
        <div class="tree-right"></div>
        <div class="tree-small"></div>
        <div class="cloud-1"></div>
        <div class="cloud-2"></div>
        <div class="cloud-3"></div>
        <div class="grass-block"></div>
        <div class="grass-block-2"></div>
        <div class="flower"></div>
        <div class="mushroom"></div>

        <div class="hero-inner container">
            <div class="hero-copy">
                <p class="hero-eyebrow"><i class="fas fa-cube"></i><span>个人博客基地 / Minecraft Style</span></p>

                <div class="name-container">
                    <div class="text-section">
                        <h1 id="typing-text"><span class="highlight"></span></h1>
                    </div>
                </div>

                <p class="hero-intro">
                    这里像一块慢慢扩建的方块世界，用来记录 AI、代码、学习笔记和一些突然冒出来的奇思妙想。
                </p>

                <div class="hero-actions">
                    <a href="blog.html" class="pixel-button pixel-button-primary"><i class="fas fa-book-open"></i> 看博客</a>
                    <a href="projects.html" class="pixel-button"><i class="fas fa-hammer"></i> 看项目</a>
                    <a href="todo.html" class="pixel-button"><i class="fas fa-tasks"></i> 施工清单</a>
                </div>

                <div class="progress-container" aria-label="网站建设进度">
                    <div class="progress-item">
                        <div class="progress-label">
                            <span>建站进度</span>
                            <span>30%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div id="build-progress-bar" class="progress-bar-fill"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-label">
                            <span>优化进度</span>
                            <span>8%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div id="optimize-progress-bar" class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="avatar-container">
                <div class="profile-picture">
                    <img src="images/handson.png" alt="个人头像" class="avatar">
                </div>
            </div>
        </div>
    </section>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
