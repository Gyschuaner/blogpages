<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - 个人主页</title>
    <link rel="stylesheet" href="style.css?v=20260526-folders1">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <header id="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Xgg的个人主页</a>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="home.html">首页</a></li>
                    <li><a href="about.html">关于我</a></li>
                    <li><a href="skills.html">技能</a></li>
                    <li><a href="projects.html">项目</a></li>
                    <li><a href="blog.html">博客</a></li>
                    <li><a href="timeline.html">轨迹</a></li>
                </ul>
            </nav>
            <div class="social-links">
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-bilibili"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <!-- 搜索功能 - 固定在左上角 -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索博客..." autocomplete="off">
            <button id="search-button" class="search-button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
    
    <!-- 博客部分 -->
    <section id="blog" class="blog">
        <div class="container">
            <h2 class="section-title">我的博客</h2>
            
            <div class="blog-index-layout">
                <aside class="blog-folder-panel" aria-label="博客分类">
                    <div class="folder-panel-title">
                        <i class="fas fa-folder"></i>
                        <span>分类文件夹</span>
                    </div>
                    <div class="blog-folder-list" role="list">
                        <!-- 分类文件夹将通过JavaScript动态生成 -->
                    </div>
                </aside>

                <div class="blog-list-shell">
                    <div class="blog-list-toolbar">
                        <span class="blog-list-status">全部文章</span>
                    </div>
                    <div class="blog-list">
                        <!-- 博客列表将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 Xgg的个人主页. All rights reserved.</p>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="blog.html">博客</a>
                    <a href="contact.html">联系我</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- 引入JavaScript文件 -->
    <script src="script.js"></script>
    <script src="js/blog-script.js"></script>
    
    <script>
        // 博客搜索功能
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化搜索功能
            function initSearch() {
                const blogLoader = window.blogLoaderInstance;
                if (!blogLoader || initSearch.initialized) {
                    console.error('BlogLoader not initialized');
                    return;
                }
                initSearch.initialized = true;
                
                const searchInput = document.getElementById('search-input');
                const searchButton = document.getElementById('search-button');

                function runSearch() {
                    blogLoader.setSearchQuery(searchInput.value);
                }
                
                // 点击搜索按钮
                searchButton.addEventListener('click', () => {
                    runSearch();
                });
                
                // 输入框输入
                searchInput.addEventListener('input', () => {
                    runSearch();
                });
                
                // 输入框回车
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        runSearch();
                    }
                });
            }
            
            if (window.blogLoaderInstance) {
                initSearch();
            } else {
                document.addEventListener('blogLoaderReady', initSearch);
            }
        });
    </script>
    </body>
</html>
